<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <title>GSAP példa</title>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
</head>
<body>

<div class="box"></div>

<script>
  gsap.to(".box", {
    x: 300,
    duration: 1.5,
    rotation: 360
  });
</script>

<style>
  body { padding: 40px; }
  .box {
    width: 100px;
    height: 100px;
    background: crimson;
  }
</style>

</body>
</html>
