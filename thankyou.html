<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Köszönjük!</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Inter', sans-serif;
}

body {
  background: radial-gradient(circle at 20% 30%, #3b2dbf 0%, #0b0b0f 40%);
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  overflow: hidden;
}

.container {
  text-align: center;
  max-width: 700px;
  padding: 40px;
  position: relative;
}

h1 {
  font-size: 3rem;
  font-weight: 800;
  margin-bottom: 20px;
}

p {
  font-size: 1.2rem;
  opacity: 0.8;
  margin-bottom: 40px;
}

.button {
  display: inline-block;
  padding: 15px 35px;
  border-radius: 12px;
  background: linear-gradient(90deg, #6a5cff, #8b5cf6);
  color: white;
  text-decoration: none;
  font-weight: 600;
  transition: 0.3s ease;
}

.button:hover {
  transform: translateY(-3px);
  box-shadow: 0 10px 30px rgba(139,92,246,0.4);
}

.glow {
  position: absolute;
  width: 500px;
  height: 500px;
  background: radial-gradient(circle, rgba(139,92,246,0.4) 0%, transparent 70%);
  top: -150px;
  right: -150px;
  filter: blur(60px);
  z-index: -1;
}
</style>
</head>

<body>

<div class="container">
  <div class="glow"></div>
  <h1>Köszönjük a kitöltést! 🚀</h1>
  <p>Hamarosan felvesszük veled a kapcsolatot.</p>

  <a href="index.html" class="button">Vissza a főoldalra</a>
</div>

</body>
</html>
